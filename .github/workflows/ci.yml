name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & synth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web (type-check + Vite production build)
        run: npm run build:web

      - name: Type-check services
        run: npm run build:services

      - name: Synthesize CDK stack (bundles Lambdas, no AWS account needed)
        run: npm run synth
