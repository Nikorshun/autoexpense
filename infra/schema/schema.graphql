type Expense {
  id: ID!
  merchant: String!
  date: String!
  amount: Float!
  currency: String!
  category: String!
  status: String!
  source: String!
  confidence: Float!
  policyNote: String
  createdAt: String!
  updatedAt: String!
}

input ExpenseInput {
  merchant: String!
  date: String!
  amount: Float!
  currency: String!
  category: String!
  status: String!
  source: String!
  confidence: Float!
  policyNote: String
  createdAt: String
}

type BankConnection {
  link: String!
  requisitionId: String!
}

type SyncResult {
  imported: Int!
}

type Institution {
  id: String!
  name: String!
  logo: String
  bic: String
}

type Query {
  listExpenses: [Expense!]!
  listInstitutions(country: String!): [Institution!]!
}

type Mutation {
  createExpense(input: ExpenseInput!): Expense!
  updateExpense(id: ID!, input: ExpenseInput!): Expense!
  deleteExpense(id: ID!, date: String!): ID
  connectBank(institutionId: String!): BankConnection!
  syncBank(requisitionId: String!): SyncResult!
}

type Subscription {
  onCreateExpense: Expense @aws_subscribe(mutations: ["createExpense"])
}
